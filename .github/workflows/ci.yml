name: CI - Testes Automatizados com DevOps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t tcc-devops-testes .

      - name: Executar testes automatizados no container
        run: |
          docker run --name tcc-tests tcc-devops-testes
          docker cp tcc-tests:/app/report.html ./report.html

      - name: Upload do relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: report.html
